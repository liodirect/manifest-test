<!DOCTYPE html>
<html lang="zh">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>显化卡点测试</title>
<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    background: #f6f4f1;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 480px;
    margin: auto;
    padding: 20px;
}

h1 {
    font-size: 22px;
    margin-bottom: 20px;
}

button {
    width: 100%;
    margin: 10px 0;
    padding: 14px;
    border: none;
    background: #6b5b95;
    color: white;
    border-radius: 12px;
    font-size: 15px;
}

button:hover {
    opacity: 0.9;
}

.hidden {
    display: none;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 18px;
    margin: 20px 0;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

.big-title {
    font-size: 24px;
    font-weight: bold;
}

.big-percent {
    font-size: 28px;
    font-weight: bold;
    color: #6b5b95;
}

.subtitle {
    font-size: 14px;
    color: #666;
    margin-top: 6px;
}

.section-title {
    font-weight: bold;
    margin-bottom: 10px;
}

.small-text {
    font-size: 14px;
    line-height: 1.6;
    color: #444;
}

canvas {
    max-width: 100%;
}

.download-btn {
    background: black;
}
</style>
</head>

<body>

<div class="container">

<h1 id="title">你的显化卡点是什么？</h1>

<div id="start">
    <p>这个测试将帮助你识别当前显化过程中最核心的阻力。</p>
    <button onclick="startTest()">开始测试</button>
</div>

<div id="quiz" class="hidden">
    <h2 id="question"></h2>
    <div id="options"></div>
</div>

<div id="result" class="hidden">

    <!-- 1 主类型区 -->
    <div class="card">
        <div id="mainType" class="big-title"></div>
        <div id="mainPercent" class="big-percent"></div>
        <div id="subTypes" class="small-text"></div>
    </div>

    <!-- 2 雷达图 -->
    <div class="card">
        <div class="section-title">显化结构图</div>
        <canvas id="radarChart"></canvas>
    </div>

    <!-- 维度解释 -->
    <div class="card">
        <div class="section-title">六维含义说明</div>
        <div class="small-text">
            信念稳定度：你是否真正认领目标<br><br>
            情绪波动度：是否放大“还没有”的感觉<br><br>
            行动对齐度：现实动作是否匹配目标<br><br>
            身份承载力：是否允许自己升级<br><br>
            控制执念度：是否强行掌控结果<br><br>
            潜意识抗拒度：是否在关键时刻回避
        </div>
    </div>

    <!-- 3 行动建议 -->
    <div class="card">
        <div class="section-title">专属行动建议</div>
        <div id="actionAdvice" class="small-text"></div>
    </div>

    <!-- 4 结语 + 下载 -->
    <div class="card">
        <div class="small-text">
            显化不是许愿，而是结构调整。  
            当结构改变，现实会慢慢跟上。
        </div>
        <button class="download-btn" onclick="downloadResult()">下载结果图片</button>
    </div>

</div>
<script>

const questions = [
{
    q: "当你想到自己想要的目标时，你的第一反应是？",
    options: [
        { 
            text: "希望能成，但也不确定",
            scores: { belief: 2, identity: 1 }
        },
        { 
            text: "有点焦虑，怕落空",
            scores: { anxiety: 2, control: 1 }
        },
        { 
            text: "我会想很多准备步骤",
            scores: { action: 2, control: 1 }
        },
        { 
            text: "我会怀疑自己是否能承受",
            scores: { identity: 2, resistance: 1 }
        }
    ]
},
{
    q: "当机会出现时，你通常会？",
    options: [
        { 
            text: "犹豫一下再说",
            scores: { belief: 1, resistance: 2 }
        },
        { 
            text: "担心是不是陷阱",
            scores: { anxiety: 2, control: 1 }
        },
        { 
            text: "继续准备还不够好",
            scores: { action: 2, identity: 1 }
        },
        { 
            text: "担心改变后的压力",
            scores: { identity: 2, resistance: 1 }
        }
    ]
}
];

let current = 0;
let scores = {
    belief: 0,
    anxiety: 0,
    action: 0,
    identity: 0,
    control: 0,
    resistance: 0
};

function startTest() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
}

function showQuestion() {
    const q = questions[current];
    document.getElementById("question").innerText = q.q;
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";
    q.options.forEach(option => {
        const btn = document.createElement("button");
        btn.innerText = option.text;
        btn.onclick = () => selectOption(option.scores);
        optionsDiv.appendChild(btn);
    });
}

function selectOption(optionScores) {

    for (let key in optionScores) {
        scores[key] += optionScores[key];
    }

    current++;

    if (current < questions.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    const maxType = Object.keys(scores).reduce((a, b) =>
        scores[a] > scores[b] ? a : b
    );
const sorted = Object.keys(scores)
    .sort((a,b) => scores[b] - scores[a]);

const main = sorted[0];
const second = sorted[1];
const third = sorted[2];

const total = Object.values(scores).reduce((a,b)=>a+b,0);
const mainPercent = Math.round((scores[main] / total) * 100);
    const results = {
    belief: {
        title: "信念未认领型",
        core: "你想要结果，但内在没有真正“认领”它。你更像是在试试看，而不是已经决定。",
        mistake: "显化不是许愿，而是站位。如果你还在犹豫，你的行动就会替你犹豫。",
        action: "连续7天写下：'我已经是能拥有这件事的人。' 并每天做一个微小但具体的现实动作去靠近它。"
    },
    anxiety: {
        title: "焦虑拉扯型",
        core: "你太在意结果是否发生，反而放大了“还没有”的感受。",
        mistake: "当注意力长期停留在缺失感，潜意识会默认你仍处于匮乏状态。",
        action: "每天固定10分钟，只允许自己想象成功后的稳定状态，而不是成功瞬间。训练稳定感，而非高潮感。"
    },
    action: {
        title: "行动错位型",
        core: "你相信显化，但现实行动与目标还没有完全对齐。",
        mistake: "显化不是只靠内在感受，它需要现实动作作为确认信号。",
        action: "列出一个你拖延的关键动作，48小时内完成它。哪怕完成60%。"
    },
    identity: {
    title: "身份承载不足型",
        core: "当你真的接近升级时，潜意识开始自我保护。",
        mistake: "你并不是做不到，而是担心承担更大的责任或曝光。",
        action: "写下：'如果这件事真的成功，我最害怕的是什么？' 然后逐条拆解它。"
    }
};

document.getElementById("mainType").innerText =
    results[main].title;

document.getElementById("mainPercent").innerText =
    "阻力指数 " + mainPercent + "%";

document.getElementById("subTypes").innerHTML =
    "你也可能是：" +
    results[second].title +
    (scores[third] > 0 ? " / " + results[third].title : "");

document.getElementById("actionAdvice").innerHTML =
    results[main].action;


// 根据得分生成雷达数据
const canvas = document.getElementById("radarChart");
const ctx = canvas.getContext("2d");

new Chart(ctx, {
    type: 'radar',
    data: {
        labels: [
            '信念稳定度',
            '情绪波动度',
            '行动对齐度',
            '身份承载力',
            '控制执念度',
            '潜意识抗拒度'
        ],
        datasets: [{
            label: '显化阻力指数',
            data: [
                (scores.belief / 4) * 100,
                (scores.anxiety / 4) * 100,
                (scores.action / 4) * 100,
                (scores.identity / 4) * 100,
                (scores.control / 4) * 100,
                (scores.resistance / 4) * 100
            ]
        }]
    },
    options: {
        responsive: true,
        scales: {
            r: {
                min: 0,
                max: 100
            }
        }
    }
});

function downloadResult() {
    html2canvas(document.getElementById("result")).then(canvas => {
        const link = document.createElement("a");
        link.download = "显化结果.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}

</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</body>
</html>
